name: 🚀 Release packages

on:
    release:
        types: [ released ]

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        name: 🚀 Publish to Registry
        steps:
            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: 🍞 Setup Bun
                uses: oven-sh/setup-bun@v2

            -   uses: actions/setup-node@v6
                with:
                    node-version: '25'
                    registry-url: 'https://registry.npmjs.org'

            -   name: ✏️ Tag v${{ env.RELEASE_VERSION }}
                run: |
                    # Temporary solution for the commented out lines below.
                    sed -i 's/0.0.0/${{ env.RELEASE_VERSION }}/g' packages/*/package.json
                    sed -i 's/workspace:\*/${{ env.RELEASE_VERSION }}/g' packages/*/package.json

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile

            -   name: 🔨 Build
                run: |
                    bun --cwd packages/encoding build
                    bun --cwd packages/encryption build
                    bun --cwd packages/common build
                    bun --cwd packages/audio-source build
                    bun --cwd packages/airplay build
                    bun --cwd packages/companion-link build
                    bun --cwd packages/raop build
                    bun --cwd packages/devices build

            -   name: 🚀 Publish v${{ env.RELEASE_VERSION }}
                run: |
                    (cd packages/encoding && npm publish --access public)
                    (cd packages/encryption && npm publish --access public)
                    (cd packages/common && npm publish --access public)
                    (cd packages/audio-source && npm publish --access public)
                    (cd packages/airplay && npm publish --access public)
                    (cd packages/companion-link && npm publish --access public)
                    (cd packages/raop && npm publish --access public)
                    (cd packages/devices && npm publish --access public)
