syntax = "proto2";

message DiscoverySessionConfiguration {
    optional int64 features = 1;
    optional string outputDeviceUID = 2;
    optional string routingContextUID = 3;
    optional int64 targetSessionID = 4;
    optional bool alwaysAllowUpdates = 5;
    optional bool cachedDiscoveryEnabled = 6;
    optional bool enableThrottling = 7;
    optional bool populatesExternalDevice = 8;
}
