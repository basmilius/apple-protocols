syntax = "proto2";

import "ProtocolMessage.proto";

extend ProtocolMessage {
    optional ModifyOutputContextRequestMessage modifyOutputContextRequestMessage = 52;
}

message ModifyOutputContextRequestType {
    enum Enum {
        SharedAudioPresentation = 1;
    }
}

message ModifyOutputContextRequestMessage {
    optional ModifyOutputContextRequestType.Enum outputContextType = 1;
    repeated string addingOutputDeviceUIDs = 2;
    repeated string removingOutputDeviceUIDs = 3;
    repeated string settingOutputDeviceUIDs = 4;
    repeated string clusterAwareAddingOutputDeviceUIDs = 5;
    repeated string clusterAwareRemovingOutputDeviceUIDs = 6;
    repeated string clusterAwareSettingOutputDeviceUIDs = 7;
}
