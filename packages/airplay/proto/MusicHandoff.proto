syntax = "proto2";

import "PlayerPath.proto";

message MusicHandoffEvent {
    enum Type {
        Unknown = 0;
        Succeeded = 1;
        Failed = 2;
    }

    optional string sessionIdentifier = 1;
    optional Type type = 2;
}

message MusicHandoffSession {
    optional string identifier = 1;
    optional PlayerPath sourcePlayerPath = 2;
    optional PlayerPath destinationPlayerPath = 3;
}
