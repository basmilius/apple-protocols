syntax = "proto2";

import "ProtocolMessage.proto";
import "PlayerPath.proto";
import "PlaybackSessionRequestMessage.proto";

extend ProtocolMessage {
    optional PlaybackSessionMigrateBeginMessage playbackSessionMigrateBeginMessage = 79;
}

message PlaybackSessionMigrateBeginMessage {
    optional PlaybackSessionRequestMessage request = 1;
    optional PlayerPath playerPath = 2;
}
